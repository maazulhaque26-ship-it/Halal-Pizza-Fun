name: Deploy to Vercel

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Sanitize secrets (strip whitespace/newlines)
        run: |
          echo "VERCEL_ORG_ID=$(echo "$VERCEL_ORG_ID" | tr -d '[:space:]')" >> $GITHUB_ENV
          echo "VERCEL_PROJECT_ID=$(echo "$VERCEL_PROJECT_ID" | tr -d '[:space:]')" >> $GITHUB_ENV
          echo "VERCEL_TOKEN=$(echo "$VERCEL_TOKEN" | tr -d '[:space:]')" >> $GITHUB_ENV

      - name: Pull production env vars
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy prebuilt artifact
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
