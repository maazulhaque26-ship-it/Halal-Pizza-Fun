# ─────────────────────────────────────────────────────────────────────────────
# HPF Food Delivery — Production Deployment
# Strategy: pre-built deploy (pull → build locally → deploy artifact)
#
# Why pre-built?
#   vercel build runs npm run build locally in CI, so build errors appear
#   in your GitHub Actions log — not silently in Vercel's dashboard.
#   vercel deploy --prebuilt then uploads the artifact. No remote build.
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy to Vercel

on:
  push:
    branches: [master]
  workflow_dispatch:

# Cancel any in-progress run on the same branch before starting a new one.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ─── Job 1: Preflight ─────────────────────────────────────────────────────────
jobs:
  preflight:
    name: Preflight — Secret Validation
    runs-on: ubuntu-latest
    steps:
      - name: Verify all required secrets are present
        run: |
          MISSING=()
          [[ -z "${{ secrets.VERCEL_TOKEN }}"      ]] && MISSING+=("VERCEL_TOKEN")
          [[ -z "${{ secrets.VERCEL_ORG_ID }}"     ]] && MISSING+=("VERCEL_ORG_ID")
          [[ -z "${{ secrets.VERCEL_PROJECT_ID }}" ]] && MISSING+=("VERCEL_PROJECT_ID")

          if [[ ${#MISSING[@]} -gt 0 ]]; then
            echo "❌ Missing required GitHub secrets: ${MISSING[*]}"
            echo ""
            echo "Fix: GitHub → Repository → Settings → Secrets and variables → Actions"
            echo "Add each missing secret with its correct value from Vercel."
            exit 1
          fi

          echo "✅ All required secrets are present."

# ─── Job 2: Build & Deploy ────────────────────────────────────────────────────
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: preflight

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      NEXT_PUBLIC_SOCKET_URL: https://hpf-socket-server.onrender.com

    steps:
      # ── Step 1: Checkout ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Step 2: Node.js 20 ────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      # ── Step 3: Install dependencies ──────────────────────────────────────
      # npm ci installs exactly what is in package-lock.json.
      # This includes typescript (devDependency) which Next.js build needs.
      - name: Install dependencies
        run: npm ci

      # ── Step 4: Lint (non-blocking) ───────────────────────────────────────
      # Warnings and lint errors are logged but do NOT stop the deployment.
      # Fix lint issues separately — never block a deploy for lint alone.
      - name: Run ESLint
        run: npm run lint || echo "⚠️ Lint warnings detected — continuing deploy."

      # ── Step 5: Install Vercel CLI (pinned major version) ─────────────────
      # Pinning prevents a surprise breaking change from killing CI overnight.
      - name: Install Vercel CLI
        run: npm install --global vercel@54

      # ── Step 6: Validate VERCEL_TOKEN before any build work ───────────────
      - name: Validate VERCEL_TOKEN
        run: |
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            "https://api.vercel.com/v2/user")

          echo "Vercel API status: HTTP $HTTP"

          if [[ "$HTTP" == "200" ]]; then
            echo "✅ VERCEL_TOKEN is valid."
          elif [[ "$HTTP" == "401" ]]; then
            echo "❌ Token INVALID or EXPIRED. Go to vercel.com/account/tokens, create a new token, update GitHub secret VERCEL_TOKEN."
            exit 1
          else
            echo "❌ Unexpected response HTTP $HTTP. Check vercel-status.com."
            exit 1
          fi

      # ── Step 7: Pull Vercel project config & env vars ─────────────────────
      - name: Pull Vercel environment
        run: |
          vercel pull --yes \
            --environment=production \
            --token=${{ secrets.VERCEL_TOKEN }}

      # ── Step 8: Inject NEXT_PUBLIC_SOCKET_URL ─────────────────────────────
      # Force-set the production socket URL regardless of what Vercel pulled.
      - name: Inject NEXT_PUBLIC_SOCKET_URL
        run: |
          touch .env.production.local
          grep -v "^NEXT_PUBLIC_SOCKET_URL=" .env.production.local \
            > .env.production.local.tmp || true
          mv .env.production.local.tmp .env.production.local
          echo "NEXT_PUBLIC_SOCKET_URL=${NEXT_PUBLIC_SOCKET_URL}" >> .env.production.local
          echo "✅ NEXT_PUBLIC_SOCKET_URL = ${NEXT_PUBLIC_SOCKET_URL}"

      # ── Step 9: Build ──────────────────────────────────────────────────────
      # vercel build runs: npm run build (next build) + TypeScript check.
      # typescript must be in devDependencies — npm ci installs it above.
      # Build output goes to .vercel/output/
      - name: Build (vercel build --prod)
        run: |
          vercel build --prod \
            --token=${{ secrets.VERCEL_TOKEN }}

      # ── Step 10: Deploy pre-built artifact ────────────────────────────────
      # Uploads .vercel/output to Vercel CDN. No remote build. Near-instant.
      - name: Deploy to Vercel (--prebuilt)
        id: deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod \
            --token=${{ secrets.VERCEL_TOKEN }})

          echo "DEPLOY_URL=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "✅ Deployed: $DEPLOY_URL"

      # ── Step 11: Job Summary ──────────────────────────────────────────────
      - name: Write deployment summary
        if: success()
        run: |
          echo "## ✅ Deployment Successful" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **URL** | ${{ steps.deploy.outputs.DEPLOY_URL }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Commit** | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Triggered by** | ${{ github.actor }} |" >> "$GITHUB_STEP_SUMMARY"

      # ── Step 12: Failure diagnostics ─────────────────────────────────────
      - name: Print failure diagnostics
        if: failure()
        run: |
          echo "## ❌ Deployment Failed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Most common causes:**" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`typescript\` missing from devDependencies in package.json" >> "$GITHUB_STEP_SUMMARY"
          echo "- VERCEL_TOKEN expired or incorrect" >> "$GITHUB_STEP_SUMMARY"
          echo "- VERCEL_ORG_ID or VERCEL_PROJECT_ID mismatch" >> "$GITHUB_STEP_SUMMARY"
          echo "- TypeScript type error in source code" >> "$GITHUB_STEP_SUMMARY"
          echo "- package-lock.json out of sync with package.json" >> "$GITHUB_STEP_SUMMARY"