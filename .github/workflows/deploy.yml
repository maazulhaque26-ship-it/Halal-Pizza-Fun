name: Deploy to Vercel

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SOCKET_URL: https://hpf-socket-server.onrender.com
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Type Check
        run: npx tsc --noEmit

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel production environment variables
        continue-on-error: true
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Ensure production socket URL
        run: |
          touch .env.production.local
          grep -v "^NEXT_PUBLIC_SOCKET_URL=" .env.production.local > .env.production.local.tmp || true
          mv .env.production.local.tmp .env.production.local
          echo "NEXT_PUBLIC_SOCKET_URL=${NEXT_PUBLIC_SOCKET_URL}" >> .env.production.local

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }} --build-env NEXT_PUBLIC_SOCKET_URL=${NEXT_PUBLIC_SOCKET_URL}

      - name: Deploy
        run: vercel deploy --prebuilt --prod --archive=tgz --token=${{ secrets.VERCEL_TOKEN }}
