name: Deploy to Vercel

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── 2. Node ───────────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      # ── 3. Vercel CLI ─────────────────────────────────────────────────────
      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      # ── 4. Pull production env vars ───────────────────────────────────────
      # This is the step that was missing.
      #
      # `vercel pull --environment=production` contacts the Vercel API,
      # downloads every Production environment variable, and writes them to
      # .env.production.local. `vercel build` then reads that file and injects
      # the vars into `process.env` before running `next build`.
      #
      # Without this step, NEXT_PUBLIC_* vars are undefined at build time, so
      # Next.js inlines "undefined" → the || "localhost" fallback wins → the
      # production bundle connects to ws://localhost:4000 forever.
      #
      # VERCEL_ORG_ID and VERCEL_PROJECT_ID tell the CLI which project to pull
      # from. They are already stored as GitHub Secrets (set via
      # github-set-secrets.js). VERCEL_TOKEN authenticates the API call.
      - name: Pull Vercel production environment variables
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # ── 5. Ensure NEXT_PUBLIC_SOCKET_URL is available ────────────────────
      # The var may come from Vercel's Production env (vercel pull) OR from
      # the hardcoded value below. Either source is acceptable; this step
      # writes it into .env.production.local so vercel build picks it up,
      # and then verifies it is not pointing at localhost.
      - name: Ensure NEXT_PUBLIC_SOCKET_URL is set
        env:
          NEXT_PUBLIC_SOCKET_URL: https://hpf-socket-server.onrender.com
        run: |
          # Pull value from vercel-downloaded file (preferred) or fall back to env above
          PULLED=""
          if [ -f .env.production.local ]; then
            PULLED=$(grep "^NEXT_PUBLIC_SOCKET_URL=" .env.production.local | cut -d= -f2- || true)
          fi

          if [ -n "$PULLED" ] && [[ "$PULLED" != *"localhost"* ]] && [[ "$PULLED" != *"127.0.0.1"* ]]; then
            echo "✅ NEXT_PUBLIC_SOCKET_URL from Vercel pull: $PULLED"
          else
            # Write the known-good URL into the env file so vercel build picks it up
            echo "NEXT_PUBLIC_SOCKET_URL=${NEXT_PUBLIC_SOCKET_URL}" >> .env.production.local
            echo "✅ NEXT_PUBLIC_SOCKET_URL injected from workflow: ${NEXT_PUBLIC_SOCKET_URL}"
          fi

      # ── 6. Build ──────────────────────────────────────────────────────────
      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          NEXT_PUBLIC_SOCKET_URL: https://hpf-socket-server.onrender.com

      # ── 7. Deploy prebuilt artifacts ──────────────────────────────────────
      - name: Deploy
        run: vercel deploy --prebuilt --prod --archive=tgz --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
